name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [microcms-update]

permissions:
  contents: read
  pages: write
  id-token: write

# 連続更新時は進行中のビルドをキャンセルして最新だけデプロイ
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # microCMS の下書き保存時は draftKey が付くため、公開反映のビルドはスキップ
    if: >
      github.event_name != 'repository_dispatch' ||
      github.event.client_payload.draftKey == null ||
      github.event.client_payload.draftKey == ''
    runs-on: ubuntu-latest
    steps:
      - name: Webhook payload
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "api=${{ github.event.client_payload.api }}"
          echo "type=${{ github.event.client_payload.type }}"
          echo "id=${{ github.event.client_payload.id }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
